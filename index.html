<!DOCTYPE html>
<html>
<head>
    <title>My First DevOps Project</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #dcdcdc;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
            color: #ccc;
        }

        .badge {
            margin-top: 15px;
            padding: 8px 15px;
            background-color: #28a745;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <h1>🚀 DevOps Deployment Success!</h1>

            <p>Hello from <b>Docker + Jenkins + EC2</b></p>

            <p>Your CI/CD pipeline is working perfectly ✅</p>

            <div class="badge">
                LIVE PROJECT
            </div>
        </div>
    </div>

    <div class="footer">
        Created by Pavan Reddy | DevOps Project
    </div>

</body>
</html>
